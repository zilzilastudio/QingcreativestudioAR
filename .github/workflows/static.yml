# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- START OF OBFUSCATION SECURITY LAYER ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JavaScript Obfuscator
        run: npm install javascript-obfuscator

      - name: Protect and Scramble Inline JavaScript Code
        run: |
          node -e "
          const fs = require('fs');
          const JavaScriptObfuscator = require('javascript-obfuscator');
          
          const filePath = './webar-secure-1234x/index.html';
          if (!fs.existsSync(filePath)) {
            console.error('Error: Cannot find index.html at ' + filePath);
            process.exit(1);
          }
          
          let html = fs.readFileSync(filePath, 'utf8');
          const scriptRegex = /(<script[^>]*>)([\s\S]*?)(<\/script>)/gi;
          
          let updatedHtml = html.replace(scriptRegex, (match, openTag, jsCode, closeTag) => {
            if (!jsCode.trim() || openTag.includes('src=')) return match;
            
            try {
              const obfuscated = JavaScriptObfuscator.obfuscate(jsCode, {
                compact: true,
                controlFlowFlattening: true,
                controlFlowFlatteningThreshold: 1.0,
                numbersToExpressions: true,
                stringArray: true,
                stringArrayEncoding: ['rc4'],
                stringArrayThreshold: 1.0,
                domainLock: ['.zilzilastudio.com'],
                domainLockRedirectUrl: 'https://zilzilastudio.com'
              }).getObfuscatedCode();
              
              return openTag + '\n' + obfuscated + '\n' + closeTag;
            } catch (err) {
              console.error('Obfuscation failed inside script block:', err);
              return match;
            }
          });
          
          fs.writeFileSync(filePath, updatedHtml, 'utf8');
          console.log('Success! HTML file successfully encrypted.');
          "
      # --- END OF OBFUSCATION SECURITY LAYER ---

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './webar-secure-1234x'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
