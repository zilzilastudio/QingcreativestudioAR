# Simple workflow for deploying static content to GitHub Pages with Obfuscation Armor
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Obfuscator
        run: npm install -g javascript-obfuscator

      - name: Protect and Scramble Frontend Code
        run: |
          # Scrambles the index.html inside your specific app folder, secures strings, and locks it to your domain
          javascript-obfuscator ./webar-secure-1234x/index.html --output ./webar-secure-1234x/index.html --compact true --control-flow-flattening true --control-flow-flattening-threshold 1.0 --numbers-to-expressions true --string-array true --string-array-encoding 'rc4' --string-array-threshold 1.0 --domain-lock '.zilzilastudio.com' --domain-lock-redirect-url 'https://zilzilastudio.com'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload your specific application folder structure
          path: './webar-secure-1234x'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
